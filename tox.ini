[tox]
min_version = 4.0
env_list = py, lint, format_check, type_check, test_model, unit_test_services, integration_test
requires =
    tox>=4.0


[testenv]
deps =
    pytest
passenv = *


[testenv:lint]
description = Run flake8 linter
skip_install = True
deps =
    flake8
commands =
    flake8 src/ tests/ frontend/app.py


[testenv:format_check]
description = Check formatting with black
skip_install = True
deps =
    black
commands =
    black --check .


[testenv:type_check]
description = Run type checking with mypy
skip_install = True
deps =
    mypy
    types-requests
    types-PyYAML
commands =
    mypy --ignore-missing-imports src/ tests/ frontend/app.py


[flake8]
max-line-length = 100
exclude = 
    .git,
    __pycache__,
    .venv,
    build,
    dist
ignore = 
    E203
    W503


[black]
line-length = 100


[testenv:test_model]
description = Run model tests
extras = testing, mlops
commands =
    pytest tests/unit_test/test_model.py --disable-warnings -v


[testenv:unit_test_services]
description = Run unit tests for services
deps =
    prometheus-client
extras = testing
commands =
    pytest tests/unit_test --ignore=tests/unit_test/test_model.py --disable-warnings -v


[testenv:integration_test]
description = Run api endpoint tests
extras = testing, mlops, dev
commands =
    pytest tests/integration_test/test_api.py --disable-warnings -v