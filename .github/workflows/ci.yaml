name: CI ML/MLOps Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "images/*"
      - "notebooks/*"
      - "frontend/*"

  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "images/*"
      - "notebooks/*"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: cache uv and pip dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.uv_cache
          key: ${{ runner.os }}-deps-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: install uv package manager
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: install dependencies in virtual environment
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -r requirements.txt

      - name: run linters
        run: |
          source .venv/bin/activate
          tox -e lint -e format_check -e type_check

      - name: run ml pipeline
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          OWNER: ${{ secrets.OWNER }}
          MLFLOW_URI: ${{ secrets.MLFLOW_URI }}
          MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          MONGO_URL: ${{ secrets.MONGO_URL }}
        run: |
          source .venv/bin/activate
          dvc repro

      - name: register model in registry
        id: register_model
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          OWNER: ${{ secrets.OWNER }}
          MLFLOW_URI: ${{ secrets.MLFLOW_URI }}
        run: |
          source .venv/bin/activate
          python -m src.operations.register_model

      - name: run model tests
        id: model_test
        continue-on-error: true
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          OWNER: ${{ secrets.OWNER }}
          MLFLOW_URI: ${{ secrets.MLFLOW_URI }}
        run: |
          source .venv/bin/activate
          tox -e test_model

      - name: promote model to production
        id: promote_model
        if: steps.model_test.outcome == 'success'
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          OWNER: ${{ secrets.OWNER }}
          MLFLOW_URI: ${{ secrets.MLFLOW_URI }}
        run: |
          source .venv/bin/activate
          python -m src.operations.promote_model

      - name: load the production model artifact and package it for deployment
        id: load_model
        if: steps.model_test.outcome == 'success'
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          OWNER: ${{ secrets.OWNER }}
          MLFLOW_URI: ${{ secrets.MLFLOW_URI }}
        run: |
          source .venv/bin/activate
          python -m src.operations.load_model

      - name: run unit test for app services
        id: unit_test_services
        if: steps.load_model.outcome == 'success'
        run: |
          source .venv/bin/activate
          tox -e unit_test_services

      - name: run integration test
        id: integration_test
        if: steps.unit_test_services.outcome == 'success'
        env:
          MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          MONGO_URL: ${{ secrets.MONGO_URL }}
        run: |
          source .venv/bin/activate
          tox -e integration_test

      - name: deploy model and API services 
        id: serve_model
        if: steps.integration_test.outcome == 'success'
        env:
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        run: |
          source .venv/bin/activate
          python -m src.operations.serve_model

      - name: upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: logs/